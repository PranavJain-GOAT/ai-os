version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: aistack_postgres
    environment:
      POSTGRES_USER: aistack_user
      POSTGRES_PASSWORD: aistack_password
      POSTGRES_DB: aistack_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aistack_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
